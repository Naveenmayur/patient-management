services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8084
      - EUREKA_URI=http://eureka:8761/eureka/

# To run this service:
# docker-compose up --build -d
