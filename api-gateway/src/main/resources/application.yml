server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: patient-service
              uri: lb://PATIENT-SERVICE
              predicates:
                - Path=/api/patients/**

          #Routes for swagger UI
            - id: swagger-ui
              uri: lb://PATIENT-SERVICE
              predicates:
                - Path=/api-docs/patients
              filters:
                - RewritePath=/api-docs/patients,/v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}


