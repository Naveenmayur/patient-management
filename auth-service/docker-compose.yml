services:
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auth-server-db:5432/auth_db
      - EUREKA_URI=http://eureka:8761/eureka/
      - JWT_SECRET=+7FneszQDXWwcp/ifLPI4HBLz/H0Rvfp/LLM3fgru3A=
    depends_on:
      auth-server-db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  auth-server-db:
    image: postgres:latest
    container_name: auth-server-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=auth_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - auth-db-data:/var/lib/postgresql

volumes:
  auth-db-data:

# To run this service:
# docker-compose up --build -d
