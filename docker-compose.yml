services:
  eureka:
    build:
      context: ./eureka
      dockerfile: Dockerfile
    container_name: eureka
    ports:
      - "8761:8761"

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1

  billing-service:
    build:
      context: ./billing-service
      dockerfile: Dockerfile
    container_name: billing-service
    ports:
      - "8082:8082"
      - "9001:9001"
    environment:
      - EUREKA_URI=http://eureka:8761/eureka/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kafka
      - eureka

  patient-service-db:
    image: postgres:latest
    container_name: patient-service-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=patient_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d patient_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - patient-db-data:/var/lib/postgresql

  patient-service:
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    container_name: patient-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://patient-service-db:5432/patient_db
      - BILLING_SERVICE_ADDRESS=billing-service
      - BILLING_SERVICE_GRPC_PORT=9001
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_URI=http://eureka:8761/eureka/
    depends_on:
      patient-service-db:
        condition: service_healthy
      billing-service:
        condition: service_started
      kafka:
        condition: service_started
      eureka:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_URI=http://eureka:8761/eureka/
    depends_on:
      - kafka
      - eureka

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8084
      - EUREKA_URI=http://eureka:8761/eureka/
    depends_on:
      - eureka

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auth-server-db:5432/auth_db
      - EUREKA_URI=http://eureka:8761/eureka/
      - JWT_SECRET=+7FneszQDXWwcp/ifLPI4HBLz/H0Rvfp/LLM3fgru3A=
    depends_on:
      auth-server-db:
        condition: service_healthy
      eureka:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  auth-server-db:
    image: postgres:latest
    container_name: auth-server-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=auth_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - auth-db-data:/var/lib/postgresql

volumes:
  patient-db-data:
  auth-db-data:

# To run the services from the project root, use:
# docker-compose up --build -d
