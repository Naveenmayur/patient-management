services:
  kafka:
    image: apache/kafka:latest # Or a specific version like 3.8.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      # Apache official images use different env var names than Bitnami
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT

  billing-service:
    build:
      context: ./billing-service
      dockerfile: Dockerfile
    container_name: billing-service
    ports:
      - "8082:8082"  # REST API
      - "9001:9001"  # gRPC Port
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kafka

  patient-service:
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    container_name: patient-service
    ports:
      - "8081:8081"
    environment:
      # Connects to Postgres on your host machine
      - SPRING_DATASOURCE_URL=jdbc:postgresql://host.docker.internal:5432/patient_db
      # Connects to Billing Service within the Docker network
      - BILLING_SERVICE_ADDRESS=billing-service
      - BILLING_SERVICE_GRPC_PORT=9001
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - billing-service
      - kafka
    extra_hosts:
      - "host.docker.internal:host-gateway"

# To run the services from the project root, use:
# docker-compose up --build -d
